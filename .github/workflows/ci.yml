name: build-and-test

# Verifies ADSC the same way the README documents it: configure with CMake,
# build the core library + sim driver, and run the unit tests via CTest. Eigen
# is pulled from apt (libeigen3-dev ships an Eigen3Config.cmake, so the
# `find_package(Eigen3 ... NO_MODULE)` in CMakeLists.txt resolves).
#
# Tests are framework-free and fail via a non-zero exit in every build type
# (R4), so a single Release run is authoritative -- no Debug workaround needed.
# The warnings-as-errors policy (R3) is enforced with -DADSC_WERROR=ON.

on:
  push:
  pull_request:

jobs:
  build-test:
    name: cmake build + ctest (Ubuntu / GCC / Eigen3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Eigen3
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev

      - name: Configure (Release, warnings-as-errors)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DADSC_WERROR=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test (CTest)
        run: ctest --test-dir build --output-on-failure

      - name: Run simulation driver
        run: ./build/adsc_sim

      - name: Regenerate WP5 campaign artifacts (full N=500) + report runtime
        run: ./build/adsc_campaign 500 generated

      - name: Regenerate WP6 cost/FoM artifacts (consumes WP5 summary) + report runtime
        run: ./build/adsc_cost 500 generated

      - name: Regenerate T6 flux sweep table
        run: ./build/flux_sweep generated

      - name: Regenerate WP3 decay-trade CSV (feeds the WP7a visualization)
        run: ./build/decay_trade generated

      - name: Regenerate WP7a visualization pack (Python 3 stdlib only)
        run: python3 tools/viz/make_viz.py . generated/viz

      - name: Regenerate WP8 compliance findings + matrix (precheck, not legal advice)
        run: |
          python3 tools/compliance/check_compliance.py
          python3 tools/compliance/generate_matrix.py

      - name: Reproducibility gate (committed generated+evidence == regenerated, SHA-stable)
        run: |
          git diff --exit-code -- generated/ evidence/ \
            || (echo "::error::generated/ or evidence/ drifted from committed bytes (R6)"; \
                git --no-pager diff --stat -- generated/ evidence/; exit 1)

      - name: Upload generated artifacts (WP5 + WP6 + T6 + WP7a + WP8)
        uses: actions/upload-artifact@v4
        with:
          name: adsc-generated
          path: |
            generated/
            evidence/
