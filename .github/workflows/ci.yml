name: build-and-test

# Verifies the ADSC v2.0 redesign the same way the README documents it:
# configure with CMake, build the core library + sim driver, and run the
# fuel-store unit tests via CTest. Eigen is pulled from apt (libeigen3-dev
# ships an Eigen3Config.cmake, so the `find_package(Eigen3 ... NO_MODULE)`
# in CMakeLists.txt resolves without extra hints).

on:
  push:
  pull_request:

jobs:
  build-test:
    name: cmake build + ctest (Ubuntu / GCC / Eigen3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Eigen3
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test (CTest)
        run: ctest --test-dir build --output-on-failure

      - name: Run simulation driver
        run: ./build/adsc_sim

      # The Release build defines NDEBUG, which compiles out the assert()-based
      # fuel-store tests (they would pass trivially). Re-configure a Debug build
      # so the assertions actually execute and can fail CI on a logic regression.
      - name: Test with assertions live (Debug)
        run: |
          cmake -S . -B build-debug -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-debug --parallel
          ctest --test-dir build-debug --output-on-failure
